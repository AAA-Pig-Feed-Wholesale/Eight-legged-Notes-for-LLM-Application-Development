site_name: 八股文档站
site_description: 面试八股与大模型应用开发笔记
site_url: https://AAA-Pig-Feed-Wholesale.github.io/Eight-legged-Notes-for-LLM-Application-Development/
repo_url: https://github.com/AAA-Pig-Feed-Wholesale/Eight-legged-Notes-for-LLM-Application-Development
repo_name: AAA-Pig-Feed-Wholesale/Eight-legged-Notes-for-LLM-Application-Development
edit_uri: edit/main/content/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: zh
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: brown
      accent: deep orange
  features:
    - navigation.sections
    - navigation.top
    - navigation.expand
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

plugins:
  - search

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - 首页: index.md
  - 总纲:
      - 大模型应用开发八股总纲: 大模型应用开发八股总纲.md
      - 详细笔记: llm_app_dev_notes_2020_2026_detailed.md
  - 大模型:
      - LLM八股: LLM八股.md
      - Prompt工程八股: prompt工程八股.md
      - RAG八股: RAG八股.md
      - 大模型微调八股: 大模型微调八股.md
      - Agent八股: Agent八股.md
      - 前沿Agent生态八股: 前沿Agent生态八股.md
  - 基础与后端:
      - Python八股: python八股.md
      - 后端八股: 后端八股.md

exclude_docs: |
  .gitkeep
